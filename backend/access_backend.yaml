substitutions:
  name: "access-backend"
  friendly_name: "Access Controller Backend"
  ota_password: "CHANGE_ME_BEFORE_FLASHING"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: "custom.smart_access_backend"
    version: "2.0"

esp32:
  # Kein offizielles ESPHome-Board-Profil für Waveshare ESP32-S3-PoE.
  # esp32-s3-devkitc-1 als generisches S3-Target verwenden.
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# ==========================================
# NETZWERK: Ethernet via W5500 (Waveshare PoE)
# ==========================================
# FIXME: Alle SPI- und Ethernet-Pins MÜSSEN gegen das
# Datenblatt des spezifischen Waveshare ESP32-S3-PoE Boards
# verifiziert werden. Die aktuellen Werte sind Platzhalter
# und werden voraussichtlich nicht korrekt sein (insb. MOSI).
spi:
  id: spi_ethernet
  clk_pin: GPIO36    # FIXME: Im PoE-Board Datenblatt prüfen
  mosi_pin: GPIO35   # FIXME: Laut Analyse wahrscheinlich falsch
  miso_pin: GPIO37   # FIXME: Im PoE-Board Datenblatt prüfen

ethernet:
  type: W5500
  cs_pin: GPIO38     # FIXME: Im PoE-Board Datenblatt prüfen
  interrupt_pin: GPIO34
  reset_pin: GPIO33

# ==========================================
# HOME ASSISTANT API & OTA
# ==========================================
api:
  services:
    # Zutritt gewährt — wird von HA nach erfolgreicher
    # Berechtigungsprüfung (Finger/NFC) aufgerufen.
    - service: show_access_granted
      then:
        - uart.write:
            id: uart_display
            data: "OPEN\n"
        - logger.log: "HA: Zutritt gewaehrt → OPEN"

    # Zutritt verweigert — wird von HA nach fehlgeschlagener
    # Prüfung oder bei aktiver Zeitsperre aufgerufen.
    - service: show_access_denied
      then:
        - uart.write:
            id: uart_display
            data: "DENIED\n"
        - logger.log: "HA: Zutritt verweigert → DENIED"

    # Klingel-Event — ausgelöst von einer HA-Automation,
    # z.B. wenn ein Türklingel-Taster gedrückt wird.
    - service: trigger_doorbell
      then:
        - uart.write:
            id: uart_display
            data: "DOORBELL\n"
        - logger.log: "HA: Klingel-Event → DOORBELL"

    # Paket-Lieferung — z.B. aus einer HA-Automation
    # (Briefkasten-Sensor, NFC-Tag am Paketfach, etc.)
    - service: show_package
      then:
        - uart.write:
            id: uart_display
            data: "PACKAGE\n"
        - logger.log: "HA: Paket-Event → PACKAGE"

    # Individuelle Nachricht mit Icon.
    # Erlaubte icon-Werte: info, warnung, herz, liebe, haus, muell
    # Hinweis: message und icon dürfen kein ':' oder '\n' enthalten.
    - service: show_custom
      variables:
        message: string
        icon: string
      then:
        - uart.write:
            id: uart_display
            data: !lambda 'return "CUSTOM:" + icon + ":" + message + "\n";'
        - logger.log:
            format: "HA: Custom → icon=%s msg=%s"
            args: ['icon.c_str()', 'message.c_str()']

    # Display in Bereitschaft versetzen (IDLE-Seite, dann Panel aus).
    - service: set_idle
      then:
        - uart.write:
            id: uart_display
            data: "IDLE\n"
        - logger.log: "HA: Display → IDLE"

ota:
  - platform: esphome
    password: ${ota_password}

logger:
  level: DEBUG

# ==========================================
# BUS-SYSTEME: UART & I2C
# ==========================================
i2c:
  id: i2c_bus
  sda: GPIO4
  scl: GPIO5
  scan: true

uart:
  # UART1: Fingerabdruck-Scanner Grow R503
  - id: uart_finger
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 57600

  # UART2: Display-Frontend (Master → Slave Bridge)
  - id: uart_display
    tx_pin: GPIO19
    rx_pin: GPIO18
    baud_rate: 115200

# ==========================================
# NFC (PN532 via I2C)
# ==========================================
# Das Scan-Event geht an HA. HA prüft die UID gegen
# bekannte Tags und ruft ggf. show_access_granted oder
# show_access_denied auf. Kein PROCESSING-Feedback nötig,
# da NFC-Scans in der Regel schneller sind als Fingerprints.
pn532_i2c:
  id: nfc_reader
  update_interval: 1s
  on_tag:
    then:
      - homeassistant.event:
          event: esphome.access_nfc_scan
          data:
            uid: !lambda 'return x;'
      - logger.log:
          format: "NFC Tag: %s"
          args: ['x.c_str()']

# ==========================================
# FINGERPRINT (Grow R503)
# ==========================================
# Ablauf:
#   1. Finger erkannt → sofort PROCESSING ans Display
#   2. Event mit finger_id + confidence an HA
#   3. HA prüft Berechtigung (Zeitpläne, Rechte etc.)
#   4. HA ruft show_access_granted oder show_access_denied auf
fingerprint_grow:
  id: fingerprint_reader
  uart_id: uart_finger
  on_finger_scan_matched:
    - uart.write:
        id: uart_display
        data: "PROCESSING\n"
    - homeassistant.event:
        event: esphome.access_finger_scan
        data:
          finger_id: !lambda 'return to_string(finger_id);'
          confidence: !lambda 'return to_string(confidence);'
    - logger.log:
        format: "Fingerabdruck: ID=%d Confidence=%d → PROCESSING"
        args: ['finger_id', 'confidence']
  on_finger_scan_unmatched:
    - uart.write:
        id: uart_display
        data: "DENIED\n"
    - logger.log: "Fingerabdruck: Kein Match → DENIED"
