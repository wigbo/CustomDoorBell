substitutions:
  name: "waveshare-doorbell-final-v18"
  friendly_name: "Klingel Display"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

  on_boot:
    priority: -100
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_boot, animation: NONE }
      - delay: 2s
      - script.execute: demo_loop

logger:
  level: DEBUG
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT 
  ap:
    ssid: "Klingel-Rescue"
    password: "password123"

captive_portal:

image:
  - file: "hintergrund.png" 
    id: img_background
    type: RGB565
    resize: 536x240

# ----------------------------------------------------------------
# API
# ----------------------------------------------------------------
api:
  services:
    # IDLE
    - service: set_idle
      then:
        - lvgl.page.show: { id: page_idle, animation: NONE }
        - delay: 0.2s 
        - light.turn_off: backlight_power

    # WILLKOMMEN
    - service: show_welcome
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_welcome, animation: NONE }

    # KLINGELN (Animation)
    - service: trigger_doorbell
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_ringing, animation: NONE }
        - delay: 0.1s
        # ANIMATION START (Glocke)
        - lambda: |-
            lv_obj_t *obj = id(icon_bell);
            lv_anim_del(obj, NULL);
            lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
            lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, obj);
            lv_anim_set_values(&a, 256, 295);
            lv_anim_set_time(&a, 700);
            lv_anim_set_reverse_time(&a, 700);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
                lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
                lv_obj_invalidate((lv_obj_t *)obj);
            });
            lv_anim_start(&a);
        - delay: 15s
        # ANIMATION STOP
        - lambda: |-
            lv_anim_del(id(icon_bell), NULL);
            lv_obj_set_style_transform_zoom(id(icon_bell), 256, 0);
        - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

    # PAKET
    - service: show_package
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_package, animation: NONE }

    # ZUTRITT OK (Animation)
    - service: show_access_granted
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_grant, animation: NONE }
        - delay: 0.1s
        # ANIMATION START (Haken)
        - lambda: |-
            lv_obj_t *obj = id(icon_grant);
            lv_anim_del(obj, NULL);
            lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
            lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, obj);
            lv_anim_set_values(&a, 256, 275);
            lv_anim_set_time(&a, 500);
            lv_anim_set_reverse_time(&a, 500);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
                lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
                lv_obj_invalidate((lv_obj_t *)obj);
            });
            lv_anim_start(&a);
        - delay: 5s
        # ANIMATION STOP
        - lambda: |-
            lv_anim_del(id(icon_grant), NULL);
            lv_obj_set_style_transform_zoom(id(icon_grant), 256, 0);
        - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

    # ZUTRITT VERWEIGERT (Animation)
    - service: show_access_denied
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_deny, animation: NONE } 
        - delay: 0.1s
        # ANIMATION START (Kreuz)
        - lambda: |-
            lv_obj_t *obj = id(icon_deny);
            lv_anim_del(obj, NULL);
            lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
            lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, obj);
            lv_anim_set_values(&a, 256, 300);
            lv_anim_set_time(&a, 250);
            lv_anim_set_reverse_time(&a, 250);
            lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
                lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
                lv_obj_invalidate((lv_obj_t *)obj);
            });
            lv_anim_start(&a);
        - delay: 5s
        # ANIMATION STOP
        - lambda: |-
            lv_anim_del(id(icon_deny), NULL);
            lv_obj_set_style_transform_zoom(id(icon_deny), 256, 0);
        - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

    # DEMO: Demo-Durchlauf manuell neu starten (z.B. nach Änderungen)
    - service: run_demo
      then:
        - script.execute: demo_loop

    # CUSTOM MESSAGE
    - service: show_custom
      variables:
        message: string
        icon: string
      then:
        - lambda: |-
            const char* icon_str = "\U0000E887"; // Default Info
            if (icon == "warnung") icon_str = "\U0000E002";
            else if (icon == "herz") icon_str = "\U0000E87D";
            else if (icon == "liebe") icon_str = "\U0000E87D";
            else if (icon == "haus") icon_str = "\U0000E88A";
            else if (icon == "muell") icon_str = "\U0000E15B";
            else if (icon == "info") icon_str = "\U0000E887";
            
            lv_label_set_text(id(lbl_custom_icon), icon_str);
            lv_label_set_text(id(lbl_custom_text), message.c_str());
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_custom, animation: NONE }

# ----------------------------------------------------------------
# DEMO-SCRIPT: Alle Cases automatisch durchlaufen
# Timings bewusst kürzer als Produktion (für schnelles Testen):
#   Klingel: 4s statt 15s | Zutritt/Deny: 3s statt 5s
# ----------------------------------------------------------------
script:
  - id: demo_loop
    mode: restart
    then:
      # --- 1. WILLKOMMEN ---
      - lvgl.page.show: { id: page_welcome, animation: NONE }
      - delay: 3s

      # --- 2. KLINGELN ---
      - lvgl.page.show: { id: page_ringing, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_bell);
          lv_anim_del(obj, NULL);
          lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
          lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 295);
          lv_anim_set_time(&a, 700);
          lv_anim_set_reverse_time(&a, 700);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 4s
      - lambda: |-
          lv_anim_del(id(icon_bell), NULL);
          lv_obj_set_style_transform_zoom(id(icon_bell), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }
      - delay: 1s

      # --- 3. VERARBEITUNG ---
      - lvgl.page.show: { id: page_processing, animation: NONE }
      - delay: 2s

      # --- 4. ZUTRITT GEWÄHRT ---
      - lvgl.page.show: { id: page_grant, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_grant);
          lv_anim_del(obj, NULL);
          lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
          lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 275);
          lv_anim_set_time(&a, 500);
          lv_anim_set_reverse_time(&a, 500);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 3s
      - lambda: |-
          lv_anim_del(id(icon_grant), NULL);
          lv_obj_set_style_transform_zoom(id(icon_grant), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }
      - delay: 1s

      # --- 5. ZUGRIFF VERWEIGERT ---
      - lvgl.page.show: { id: page_deny, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_deny);
          lv_anim_del(obj, NULL);
          lv_obj_set_style_transform_pivot_x(obj, LV_PCT(50), 0);
          lv_obj_set_style_transform_pivot_y(obj, LV_PCT(50), 0);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 300);
          lv_anim_set_time(&a, 250);
          lv_anim_set_reverse_time(&a, 250);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 3s
      - lambda: |-
          lv_anim_del(id(icon_deny), NULL);
          lv_obj_set_style_transform_zoom(id(icon_deny), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }
      - delay: 1s

      # --- 6. PAKET ---
      - lvgl.page.show: { id: page_package, animation: NONE }
      - delay: 3s

      # --- 7. CUSTOM (Beispiel-Nachricht) ---
      - lambda: |-
          lv_label_set_text(id(lbl_custom_icon), "\U0000E15B");
          lv_label_set_text(id(lbl_custom_text), "Muell raus!");
      - lvgl.page.show: { id: page_custom, animation: NONE }
      - delay: 3s

      # --- 8. ENDE: Willkommen, dann Neustart nach kurzer Pause ---
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }
      - delay: 5s
      - script.execute: demo_loop

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

output:
  - platform: gpio
    pin: GPIO38
    id: gpio_power
    inverted: false

light:
  - platform: binary
    output: gpio_power
    id: backlight_power
    name: "Display Power"
    restore_mode: ALWAYS_ON

# SCHRIFTEN
font:
  - file: "gfonts://Montserrat@700" 
    id: font_huge_bold
    size: 55
  - file: "gfonts://Montserrat"
    id: font_large
    size: 35
  - file: "gfonts://Montserrat"
    id: font_medium
    size: 24
  
  # ICONS
  - file: "gfonts://Material Icons"
    id: font_icons
    size: 80
    glyphs: 
      - "\U0000EF64" # check_circle
      - "\U0000E5C9" # cancel
      - "\U0000E58F" # local_shipping
      - "\U0000E7F4" # notification_important
      - "\U0000E0F0" # bell
      - "\U0000E887" # info (i)
      - "\U0000E002" # warning (Dreieck)
      - "\U0000E87D" # favorite (Herz)
      - "\U0000E88A" # home (Haus)
      - "\U0000E15B" # delete (Müll)
      - "\U0000E561" # hourglass_empty (Verarbeitung)

spi:
  id: qspi_bus
  type: quad
  clk_pin: GPIO47
  data_pins: [GPIO18, GPIO7, GPIO48, GPIO5]

display:
  - platform: qspi_dbi
    id: my_display
    spi_id: qspi_bus
    model: RM67162
    cs_pin: GPIO6
    reset_pin: GPIO17
    dimensions: { width: 240, height: 536 }
    rotation: 270 
    # HIER IST DER SCHLÜSSEL ZUR ANIMATION:
    update_interval: 16ms 

# DESIGN & SEITEN
lvgl:
  displays:
    - my_display
  buffer_size: 25% 
  
  style_definitions:
    - id: clean_style
      border_width: 0
      radius: 0
      pad_all: 0
      bg_color: 0x000000
      bg_opa: COVER

  pages:
    # --- IDLE ---
    - id: page_idle
      styles: [clean_style]
      bg_color: 0x000000
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            border_width: 0

    # --- BOOT ---
    - id: page_boot
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  text: "System Start"
                  text_font: font_medium
                  align: CENTER
                  text_color: 0x666666

    # --- WILLKOMMEN ---
    - id: page_welcome
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - image:
                  src: img_background
                  align: CENTER
              - label:
                  text: "Willkommen"
                  text_font: font_large
                  align: CENTER
                  y: -35
                  text_color: 0xAAAAAA
              - label:
                  text: "FAMILIE TULUM"
                  text_font: font_huge_bold
                  align: CENTER
                  y: 25
                  text_color: 0xFFFFFF

    # --- KLINGELN ---
    - id: page_ringing
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_bell # Animation Ziel
                  text: "\U0000E7F4" # Glocke
                  text_font: font_icons
                  text_color: 0x00E5FF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "Es klingelt"
                  text_font: font_large
                  align: LEFT_MID
                  x: 160
                  text_color: 0xFFFFFF

    # --- PAKET ---
    - id: page_package
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_package
                  text: "\U0000E58F"
                  text_font: font_icons
                  text_color: 0xFFEB3B
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "PAKET"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- ZUTRITT ---
    - id: page_grant
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x1B5E20
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_grant # Animation Ziel
                  text: "\U0000EF64"
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "OFFEN"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- VERWEIGERT ---
    - id: page_deny
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0xB71C1C
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_deny # Animation Ziel
                  text: "\U0000E5C9"
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "STOPP"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- VERARBEITUNG (Fingerprint erkannt, HA prüft) ---
    - id: page_processing
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  text: "\U0000E561"
                  text_font: font_icons
                  text_color: 0xFFEB3B
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "Pruefe..."
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- CUSTOM TEXT ---
    - id: page_custom
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x333333
            styles: [clean_style]
            widgets:
              - label:
                  id: lbl_custom_icon
                  text: "\U0000E887"
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  id: lbl_custom_text
                  text: "..."
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160
                  long_mode: WRAP
                  width: 350
