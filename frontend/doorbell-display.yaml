# ================================================================
# WAVESHARE DOORBELL DISPLAY - MATERIAL ICONS (KORRIGIERT)
# ================================================================
# Hardware: ESP32-S3 + AMOLED RM67162 (536x240)
# Version: v33-icons-fixed
# ================================================================

substitutions:
  name: "waveshare-doorbell-v20"
  friendly_name: "Klingel Display"
  
  # Screen Timings
  screen_doorbell_duration: "15s"
  screen_access_duration: "5s"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_cpu: 240000000L
    build_flags:
      - -DBOARD_HAS_PSRAM
      - -DCONFIG_SPIRAM_CACHE_WORKAROUND
      - -DCONFIG_SPIRAM_SPEED_80M

  on_boot:
    - priority: 200
      then:
        - light.turn_on: backlight_power
        - delay: 0.1s
        - lvgl.page.show: { id: page_boot, animation: NONE }
        - lambda: 'ESP_LOGI("boot", "Display init");'
    
    - priority: -100
      then:
        - delay: 2s
        - script.execute: set_idle_script

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  
  on_disconnect:
    - script.execute: set_idle_script
  
  ap:
    ssid: "Klingel-Rescue"
    password: !secret rescue_password

captive_portal:

ota:
  - platform: esphome
    password: !secret klingel_display_ota_password

api:
  reboot_timeout: 0s
  encryption:
    key: !secret klingel_display_api_key
  
  services:
    - service: set_idle
      then:
        - script.execute: set_idle_script
    
    - service: show_welcome
      then:
        - script.execute: show_welcome_script
    
    - service: trigger_doorbell
      then:
        - script.execute: trigger_doorbell_script
    
    - service: show_package
      then:
        - script.execute: show_package_script
    
    - service: show_access_granted
      then:
        - script.execute: show_access_granted_script
    
    - service: show_access_denied
      then:
        - script.execute: show_access_denied_script
    
    - service: show_custom
      variables:
        message: string
        icon: string
      then:
        - script.execute:
            id: show_custom_script
            message: !lambda 'return message;'
            icon_name: !lambda 'return icon;'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

output:
  - platform: gpio
    pin: GPIO38
    id: gpio_power
    inverted: false

light:
  - platform: binary
    output: gpio_power
    id: backlight_power
    name: "Display Power"
    restore_mode: ALWAYS_OFF

image:
  - file: "hintergrund.png" 
    id: img_background
    type: RGB565

# ================================================================
# FONTS - MATERIAL ICONS (ALLE UNICODE KORRIGIERT!)
# ================================================================
font:
  - file: "gfonts://Montserrat@700" 
    id: font_huge_bold
    size: 50
    glyphs: '!"%()+=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzäöüÄÖÜß '
  
  # Material Icons - FUNKTIONIERT GARANTIERT
  - file: "gfonts://Material Icons"
    id: font_icons
    size: 100
    glyphs: 
      - "\U0000E86C"  # check_circle
      - "\U0000E5C9"  # cancel
      - "\U0000E558"  # local_shipping (Paket-LKW)
      - "\U0000E7F7"  # notifications_active
      - "\U0000E88A"  # home
      - "\U0000E87D"  # favorite
      - "\U0000E002"  # warning
      - "\U0000E000"  # error
      - "\U0000E88E"  # info
      - "\U0000E872"  # delete
      - "\U0000E7E9"  # cake
      - "\U0000E8CC"  # shopping_cart

spi:
  id: qspi_bus
  type: quad
  clk_pin: GPIO47
  data_pins: [GPIO18, GPIO7, GPIO48, GPIO5]

display:
  - platform: qspi_dbi
    id: my_display
    spi_id: qspi_bus
    model: RM67162
    cs_pin: GPIO6
    reset_pin: GPIO17
    dimensions: { width: 240, height: 536 }
    rotation: 270
    update_interval: 50ms
    auto_clear_enabled: false

# ================================================================
# LVGL
# ================================================================
lvgl:
  displays:
    - my_display
  
  color_depth: 16
  buffer_size: 25%
  
  log_level: WARN
  byte_order: big_endian
  
  default_font: font_huge_bold

  pages:
    # === IDLE (KOMPLETT SCHWARZ) ===
    - id: page_idle
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            outline_width: 0
            pad_all: 0
            radius: 0

    # === BOOT ===
    - id: page_boot
      bg_color: 0x000000
      widgets:
        - label:
            text: "SYSTEM START"
            text_font: font_huge_bold
            align: CENTER
            text_color: 0x888888

    # === WILLKOMMEN ===
    - id: page_welcome
      bg_color: 0x000000
      widgets:
        - image:
            src: img_background
            align: CENTER
        - label:
            text: "FAMILIE TULUM"
            text_font: font_huge_bold
            align: CENTER
            text_color: 0xFFFFFF

    # === KLINGELN (CYAN) ===
    - id: page_ringing
      bg_color: 0x006064
      widgets:
        - label:
            id: icon_bell
            text: "\U0000E7F7"
            text_font: font_icons
            text_color: 0x00E5FF
            align: CENTER
            y: -40
        - label:
            text: "ES KLINGELT"
            text_font: font_huge_bold
            align: CENTER
            y: 50
            text_color: 0xFFFFFF

    # === PAKET (GELB) - KORRIGIERTES ICON ===
    - id: page_package
      bg_color: 0xF57C00
      widgets:
        - label:
            id: icon_package
            text: "\U0000E558"
            text_font: font_icons
            text_color: 0xFFEB3B
            align: CENTER
            y: -40
        - label:
            text: "PAKET"
            text_font: font_huge_bold
            text_color: 0xFFFFFF
            align: CENTER
            y: 50

    # === ZUTRITT GEWÄHRT (GRÜN) ===
    - id: page_grant
      bg_color: 0x1B5E20
      widgets:
        - label:
            id: icon_grant
            text: "\U0000E86C"
            text_font: font_icons
            text_color: 0x4CAF50
            align: CENTER
            y: -50
        - label:
            text: "ZUTRITT"
            text_font: font_huge_bold
            align: CENTER
            y: 30
            text_color: 0xFFFFFF
        - label:
            text: "GEWÄHRT"
            text_font: font_huge_bold
            align: CENTER
            y: 80
            text_color: 0xFFFFFF

    # === ZUTRITT VERWEIGERT (ROT) ===
    - id: page_deny
      bg_color: 0xB71C1C
      widgets:
        - label:
            id: icon_deny
            text: "\U0000E5C9"
            text_font: font_icons
            text_color: 0xFF5252
            align: CENTER
            y: -50
        - label:
            text: "KEIN"
            text_font: font_huge_bold
            align: CENTER
            y: 30
            text_color: 0xFFFFFF
        - label:
            text: "ZUTRITT"
            text_font: font_huge_bold
            align: CENTER
            y: 80
            text_color: 0xFFFFFF

    # === CUSTOM MESSAGE (GRAU - ZENTRIERT) ===
    - id: page_custom
      bg_color: 0x424242
      widgets:
        - label:
            id: lbl_custom_icon
            text: "\U0000E88E"
            text_font: font_icons
            text_color: 0xFFEB3B
            align: CENTER
            y: -40
        - label:
            id: lbl_custom_text
            text: "..."
            text_font: font_huge_bold
            text_color: 0xFFFFFF
            text_align: CENTER
            align: CENTER
            y: 50
            long_mode: WRAP
            width: 500

# ================================================================
# SCRIPTS - MIT BLINK-ANIMATION
# ================================================================
script:
  # === IDLE ===
  - id: set_idle_script
    then:
      - script.stop: blink_icon_script
      - lvgl.page.show: 
          id: page_idle
          animation: FADE_OUT
          time: 500ms
      - delay: 0.6s
      - light.turn_off: backlight_power
      - lambda: 'ESP_LOGI("display", "Idle");'

  # === WILLKOMMEN ===
  - id: show_welcome_script
    then:
      - script.stop: blink_icon_script
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_welcome
          animation: FADE_IN
          time: 500ms
      - lambda: 'ESP_LOGI("display", "Welcome");'

  # === PAKET ===
  - id: show_package_script
    then:
      - script.stop: blink_icon_script
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_package
          animation: OVER_TOP
          time: 500ms
      - lambda: 'ESP_LOGI("display", "Package");'
      - delay: 0.3s
      - script.execute:
          id: blink_icon_script
          icon_obj: !lambda 'return (void*)id(icon_package);'

  # === KLINGELN - MIT BLINK ===
  - id: trigger_doorbell_script
    then:
      - script.stop: blink_icon_script
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_ringing
          animation: OVER_TOP
          time: 500ms
      - lambda: 'ESP_LOGI("display", "Doorbell");'
      - delay: 0.3s
      - script.execute:
          id: blink_icon_script
          icon_obj: !lambda 'return (void*)id(icon_bell);'
      - delay: ${screen_doorbell_duration}
      - script.stop: blink_icon_script
      - lvgl.page.show: 
          id: page_welcome
          animation: FADE_IN
          time: 500ms

  # === ZUTRITT GEWÄHRT - MIT BLINK ===
  - id: show_access_granted_script
    then:
      - script.stop: blink_icon_script
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_grant
          animation: OVER_TOP
          time: 500ms
      - lambda: 'ESP_LOGI("display", "Access Granted");'
      - delay: 0.3s
      - script.execute:
          id: blink_icon_script
          icon_obj: !lambda 'return (void*)id(icon_grant);'
      - delay: ${screen_access_duration}
      - script.stop: blink_icon_script
      - lvgl.page.show: 
          id: page_welcome
          animation: FADE_IN
          time: 500ms

  # === ZUTRITT VERWEIGERT - MIT BLINK ===
  - id: show_access_denied_script
    then:
      - script.stop: blink_icon_script
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_deny
          animation: OVER_TOP
          time: 500ms
      - lambda: 'ESP_LOGI("display", "Access Denied");'
      - delay: 0.3s
      - script.execute:
          id: blink_icon_script
          icon_obj: !lambda 'return (void*)id(icon_deny);'
      - delay: ${screen_access_duration}
      - script.stop: blink_icon_script
      - lvgl.page.show: 
          id: page_welcome
          animation: FADE_IN
          time: 500ms

  # === CUSTOM MESSAGE - MIT BLINK ===
  - id: show_custom_script
    parameters:
      message: string
      icon_name: string
    then:
      - script.stop: blink_icon_script
      - lambda: |-
          const char* icon_str = "\U0000E88E";  // Default: info
          
          // Icon-Mapping (Material Icons)
          if (icon_name == "warnung") icon_str = "\U0000E002";          // ⚠️
          else if (icon_name == "fehler") icon_str = "\U0000E000";      // ⚠️
          else if (icon_name == "herz" || icon_name == "liebe") icon_str = "\U0000E87D";  // ❤️
          else if (icon_name == "haus") icon_str = "\U0000E88A";        // 🏠
          else if (icon_name == "muell") icon_str = "\U0000E872";       // 🗑️
          else if (icon_name == "info") icon_str = "\U0000E88E";        // ℹ️
          else if (icon_name == "geburtstag") icon_str = "\U0000E7E9";  // 🎂
          else if (icon_name == "einkaufen") icon_str = "\U0000E8CC";   // 🛒
          else {
              ESP_LOGW("custom", "Unbekanntes Icon: %s", icon_name.c_str());
          }
          
          lv_label_set_text(id(lbl_custom_icon), icon_str);
          lv_label_set_text(id(lbl_custom_text), message.c_str());
      - light.turn_on: backlight_power
      - delay: 0.2s
      - lvgl.page.show: 
          id: page_custom
          animation: FADE_IN
          time: 500ms
      - delay: 0.3s
      - script.execute:
          id: blink_icon_script
          icon_obj: !lambda 'return (void*)id(lbl_custom_icon);'
      - lambda: 'ESP_LOGI("display", "Custom: %s", message.c_str());'

  # === BLINK-ANIMATION ===
  - id: blink_icon_script
    mode: restart
    parameters:
      icon_obj: void*
    then:
      - lambda: |-
          lv_obj_t *icon = (lv_obj_t*)icon_obj;
          
          // Opacity-Animation
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, icon);
          lv_anim_set_values(&a, LV_OPA_COVER, LV_OPA_30);
          lv_anim_set_time(&a, 600);
          lv_anim_set_playback_time(&a, 600);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_opa((lv_obj_t*)obj, val, 0);
          });
          lv_anim_start(&a);
          
          ESP_LOGI("blink", "Icon blink gestartet");

# ================================================================
# MONITORING
# ================================================================
sensor:
  - platform: template
    name: "Display Free Heap"
    lambda: 'return heap_caps_get_free_size(MALLOC_CAP_INTERNAL);'
    update_interval: 60s
    unit_of_measurement: 'B'
    accuracy_decimals: 0
  
  - platform: template
    name: "Display Free PSRAM"
    lambda: 'return heap_caps_get_free_size(MALLOC_CAP_SPIRAM);'
    update_interval: 60s
    unit_of_measurement: 'B'
    accuracy_decimals: 0
  
  - platform: uptime
    name: "Display Uptime"
    update_interval: 300s

  - platform: wifi_signal
    name: "Display RSSI"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Display Status"
