substitutions:
  name: "access-frontend"
  friendly_name: "AMOLED Display Terminal"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: "custom.smart_access_frontend"
    version: "2.0"
  # Notwendig für RM67162 QSPI-Display
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_boot, animation: NONE }
      - delay: 3s
      - lvgl.page.show: { id: page_welcome, animation: NONE }

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

# Zwingend für ruckelfreie Animationen (große Fonts + Full-Screen)
psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

# ==========================================
# AMOLED PANEL POWER (GPIO38 = Panel-Stromversorgung)
# Hard-Power-Cut verhindert OLED-Glow und Einbrennen im Idle.
# ==========================================
output:
  - platform: gpio
    pin: GPIO38
    id: gpio_power
    inverted: false

light:
  - platform: binary
    output: gpio_power
    id: backlight_power
    name: "Display Power"
    restore_mode: ALWAYS_ON

# ==========================================
# GLOBALE VARIABLEN für CUSTOM-Befehl
# ==========================================
globals:
  - id: g_custom_icon
    type: std::string
    restore_value: false
    initial_value: '"info"'
  - id: g_custom_msg
    type: std::string
    restore_value: false
    initial_value: '"..."'

# ==========================================
# UART: Empfang von Backend-Befehlen
# ==========================================
# Hinweis: GPIO0 ist ESP32-S3 Strapping-Pin (LOW = Download-Mode).
# Als UART-TX ist der Pegel im Idle HIGH — unkritisch für normalen
# Betrieb, aber bei einer Hardware-Revision auf freie Pins prüfen.
uart:
  id: uart_input
  tx_pin: GPIO0   # Frontend TX → Backend GPIO18 (RX)
  rx_pin: GPIO1   # Frontend RX ← Backend GPIO19 (TX)
  baud_rate: 115200
  debug:
    direction: RX
    dummy_receiver: false
    after:
      delimiter: "\n"
    sequence:
      - lambda: |-
          // Rohdaten (bytes) in String umwandeln und Zeilenende entfernen
          std::string msg(x.begin(), x.end());
          while (!msg.empty() && (msg.back() == '\n' || msg.back() == '\r'))
              msg.pop_back();
          if (msg.empty()) return;

          ESP_LOGI("UART_CMD", "Befehl: %s", msg.c_str());

          // Laufende Timed-Animationen stoppen, bevor ein neuer
          // Zustand gesetzt wird — verhindert Überlagerungen.
          id(timed_doorbell).stop();
          id(timed_access_granted).stop();
          id(timed_access_denied).stop();

          // LVGL-Animationen der drei animierten Icons hart zurücksetzen
          lv_anim_del(id(icon_bell), NULL);
          lv_obj_set_style_transform_zoom(id(icon_bell), 256, 0);
          lv_anim_del(id(icon_grant), NULL);
          lv_obj_set_style_transform_zoom(id(icon_grant), 256, 0);
          lv_anim_del(id(icon_deny), NULL);
          lv_obj_set_style_transform_zoom(id(icon_deny), 256, 0);

          // Befehl auswerten und entsprechendes Script starten
          if (msg == "IDLE") {
              id(timed_idle).execute();
          } else if (msg == "OPEN" || msg == "SUCCESS") {
              id(timed_access_granted).execute();
          } else if (msg == "DENIED") {
              id(timed_access_denied).execute();
          } else if (msg == "DOORBELL") {
              id(timed_doorbell).execute();
          } else if (msg == "PROCESSING") {
              id(show_processing_page).execute();
          } else if (msg == "PACKAGE") {
              id(show_package_page).execute();
          } else if (msg.size() > 7 && msg.substr(0, 7) == "CUSTOM:") {
              std::string rest = msg.substr(7);
              size_t sep = rest.find(':');
              if (sep != std::string::npos) {
                  id(g_custom_icon) = rest.substr(0, sep);
                  id(g_custom_msg)  = rest.substr(sep + 1);
              } else {
                  id(g_custom_icon) = std::string("info");
                  id(g_custom_msg)  = rest;
              }
              id(show_custom_page).execute();
          } else {
              ESP_LOGW("UART_CMD", "Unbekannter Befehl: %s", msg.c_str());
          }

# ==========================================
# SCRIPTS: UI-Zustandsmaschine
# mode: restart — laufendes Script wird neu gestartet,
# falls der selbe Befehl erneut kommt.
# ==========================================
script:
  # IDLE: Willkommensseite kurz zeigen, dann Panel abschalten
  - id: timed_idle
    mode: restart
    then:
      - lvgl.page.show: { id: page_idle, animation: NONE }
      - delay: 200ms
      - light.turn_off: backlight_power

  # PROCESSING: Bleibt bis zum nächsten Befehl (OPEN oder DENIED)
  - id: show_processing_page
    mode: restart
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_processing, animation: NONE }

  # PACKAGE: Bleibt bis zum nächsten Befehl oder set_idle
  - id: show_package_page
    mode: restart
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_package, animation: NONE }

  # CUSTOM: Icon und Text aus Globals setzen, dann Seite anzeigen
  - id: show_custom_page
    mode: restart
    then:
      - lambda: |-
          const char* icon_str = "\U0000E887";  // Default: info
          std::string icon = id(g_custom_icon);
          if      (icon == "warnung")               icon_str = "\U0000E002";
          else if (icon == "herz" || icon == "liebe") icon_str = "\U0000E87D";
          else if (icon == "haus")                  icon_str = "\U0000E88A";
          else if (icon == "muell")                 icon_str = "\U0000E15B";
          lv_label_set_text(id(lbl_custom_icon), icon_str);
          lv_label_set_text(id(lbl_custom_text), id(g_custom_msg).c_str());
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_custom, animation: NONE }

  # DOORBELL: 15s Puls-Animation, danach automatisch zur Willkommensseite
  - id: timed_doorbell
    mode: restart
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_ringing, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_bell);
          lv_anim_del(obj, NULL);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 290);
          lv_anim_set_time(&a, 800);
          lv_anim_set_playback_time(&a, 800);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 15s
      - lambda: |-
          lv_anim_del(id(icon_bell), NULL);
          lv_obj_set_style_transform_zoom(id(icon_bell), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

  # OPEN: 5s Haken-Animation, danach automatisch zur Willkommensseite
  - id: timed_access_granted
    mode: restart
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_grant, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_grant);
          lv_anim_del(obj, NULL);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 290);
          lv_anim_set_time(&a, 600);
          lv_anim_set_playback_time(&a, 600);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 5s
      - lambda: |-
          lv_anim_del(id(icon_grant), NULL);
          lv_obj_set_style_transform_zoom(id(icon_grant), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

  # DENIED: 5s Kreuz-Animation (schneller Beat = Alarm), danach Willkommen
  - id: timed_access_denied
    mode: restart
    then:
      - light.turn_on: backlight_power
      - delay: 100ms
      - lvgl.page.show: { id: page_deny, animation: NONE }
      - delay: 100ms
      - lambda: |-
          lv_obj_t *obj = id(icon_deny);
          lv_anim_del(obj, NULL);
          lv_anim_t a;
          lv_anim_init(&a);
          lv_anim_set_var(&a, obj);
          lv_anim_set_values(&a, 256, 290);
          lv_anim_set_time(&a, 300);
          lv_anim_set_playback_time(&a, 300);
          lv_anim_set_repeat_count(&a, LV_ANIM_REPEAT_INFINITE);
          lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_obj_set_style_transform_zoom((lv_obj_t *)obj, val, 0);
              lv_obj_invalidate((lv_obj_t *)obj);
          });
          lv_anim_start(&a);
      - delay: 5s
      - lambda: |-
          lv_anim_del(id(icon_deny), NULL);
          lv_obj_set_style_transform_zoom(id(icon_deny), 256, 0);
      - lvgl.page.show: { id: page_welcome, animation: FADE_IN }

# ==========================================
# SCHRIFTEN
# ==========================================
font:
  - file: "gfonts://Montserrat@700"
    id: font_huge_bold
    size: 55
  - file: "gfonts://Montserrat"
    id: font_large
    size: 35
  - file: "gfonts://Montserrat"
    id: font_medium
    size: 24
  - file: "gfonts://Material Icons"
    id: font_icons
    size: 80
    glyphs:
      - "\U0000EF64"  # check_circle     (OPEN)
      - "\U0000E5C9"  # cancel           (DENIED)
      - "\U0000E58F"  # local_shipping   (PACKAGE)
      - "\U0000E7F4"  # notification_important (DOORBELL)
      - "\U0000E887"  # info             (CUSTOM default)
      - "\U0000E002"  # warning          (CUSTOM warnung)
      - "\U0000E87D"  # favorite         (CUSTOM herz/liebe)
      - "\U0000E88A"  # home             (CUSTOM haus)
      - "\U0000E15B"  # delete           (CUSTOM muell)
      - "\U0000E561"  # hourglass_empty  (PROCESSING)

image:
  - file: "hintergrund.png"
    id: img_background
    type: RGB565
    resize: 536x240

# ==========================================
# DISPLAY: QSPI RM67162 (Pins aus Datenblatt bestätigt)
# ==========================================
spi:
  id: qspi_bus
  type: quad
  clk_pin: GPIO47
  data_pins: [GPIO18, GPIO7, GPIO48, GPIO5]

display:
  - platform: qspi_dbi
    id: my_display
    spi_id: qspi_bus
    model: RM67162
    cs_pin: GPIO6
    reset_pin: GPIO17
    dimensions: { width: 240, height: 536 }
    rotation: 270
    update_interval: 16ms  # ~60 FPS für flüssige Animationen

# ==========================================
# LVGL: SEITEN & WIDGETS
# ==========================================
lvgl:
  displays:
    - my_display
  buffer_size: 25%

  style_definitions:
    - id: clean_style
      border_width: 0
      radius: 0
      pad_all: 0
      bg_color: 0x000000
      bg_opa: COVER

  pages:
    # --- IDLE (schwarze Seite, Panel wird danach abgeschaltet) ---
    - id: page_idle
      styles: [clean_style]
      bg_color: 0x000000
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            border_width: 0

    # --- BOOT ---
    - id: page_boot
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  text: "System Start"
                  text_font: font_medium
                  align: CENTER
                  text_color: 0x666666

    # --- WILLKOMMEN (Hintergrundbild + Familienname) ---
    - id: page_welcome
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - image:
                  src: img_background
                  align: CENTER
              - label:
                  text: "Willkommen"
                  text_font: font_large
                  align: CENTER
                  y: -35
                  text_color: 0xAAAAAA
              - label:
                  text: "FAMILIE TULUM"
                  text_font: font_huge_bold
                  align: CENTER
                  y: 25
                  text_color: 0xFFFFFF

    # --- VERARBEITUNG (Fingerprint erkannt, HA prüft Berechtigung) ---
    - id: page_processing
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  text: "\U0000E561"  # hourglass_empty
                  text_font: font_icons
                  text_color: 0xFFEB3B
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "Pruefe..."
                  text_font: font_huge_bold
                  text_color: 0xAAAAAA
                  align: LEFT_MID
                  x: 160

    # --- KLINGELN (Cyan-Glocke mit Puls-Animation) ---
    - id: page_ringing
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_bell
                  text: "\U0000E7F4"  # notification_important
                  text_font: font_icons
                  text_color: 0x00E5FF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "Es klingelt"
                  text_font: font_large
                  align: LEFT_MID
                  x: 160
                  text_color: 0xFFFFFF

    # --- PAKET ---
    - id: page_package
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x000000
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_package
                  text: "\U0000E58F"  # local_shipping
                  text_font: font_icons
                  text_color: 0xFFEB3B
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "PAKET"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- ZUTRITT GEWÄHRT (grüner Hintergrund + Haken-Animation) ---
    - id: page_grant
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x1B5E20
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_grant
                  text: "\U0000EF64"  # check_circle
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "OFFEN"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- ZUGRIFF VERWEIGERT (roter Hintergrund + Kreuz-Animation) ---
    - id: page_deny
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0xB71C1C
            styles: [clean_style]
            widgets:
              - label:
                  id: icon_deny
                  text: "\U0000E5C9"  # cancel
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  text: "STOPP"
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160

    # --- INDIVIDUELLE NACHRICHT (Icon und Text aus UART-Befehl) ---
    - id: page_custom
      styles: [clean_style]
      widgets:
        - obj:
            width: 100%
            height: 100%
            bg_color: 0x333333
            styles: [clean_style]
            widgets:
              - label:
                  id: lbl_custom_icon
                  text: "\U0000E887"  # Wird per lv_label_set_text gesetzt
                  text_font: font_icons
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 40
              - label:
                  id: lbl_custom_text
                  text: "..."         # Wird per lv_label_set_text gesetzt
                  text_font: font_huge_bold
                  text_color: 0xFFFFFF
                  align: LEFT_MID
                  x: 160
                  long_mode: WRAP
                  width: 350
